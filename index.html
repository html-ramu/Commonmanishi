<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commonmanishi | Latest Telugu News</title>
    <meta name="description" content="Commonmanishi.in - Your trusted source for the latest Telugu news, national, international, politics, and sports.">
    
    <!-- Favicon: Newspaper Emoji -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📰</text></svg>">
    
    <!-- Google Fonts: Poppins (English) & Noto Sans Telugu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Animation -->
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
    </div>

    <!-- TOP BAR 1 (Slim & Dark) -->
    <div class="top-bar-slim">
        <div class="container slim-content">
            <div class="slim-left">
                <span class="news-emoji">🗞️</span>
                <span class="slim-brand">Common manishi</span>
            </div>
            <div class="slim-right social-icons-colorful">
                <a href="#" class="brand-icon insta" aria-label="Instagram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </a>
                <a href="#" class="brand-icon fb" aria-label="Facebook">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
                </a>
                <a href="#" class="brand-icon yt" aria-label="YouTube">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>
                </a>
                <a href="#" class="brand-icon wa" aria-label="WhatsApp">
                    <!-- Updated Official WhatsApp Solid Icon -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <!-- STICKY WRAPPER: Top Bar 2 + Navigation + Search -->
    <div class="sticky-header-wrapper">
        
        <!-- TOP BAR 2 (Main Header) -->
        <header class="main-header">
            <div class="container header-content">
                <div class="logo-area">
                    <!-- Website Logo Image Integrated Here -->
                    <img src="common-manishi-logo.jpg" alt="Commonmanishi Logo" class="brand-logo">
                </div>
                
                <div class="header-actions">
                    <button id="search-toggle" class="search-btn" aria-label="Search">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Navigation Bar -->
        <nav class="main-nav" id="navbar">
            <ul class="nav-list container">
                <li class="nav-item active" data-category="home">Home</li>
                <li class="nav-item" data-category="లేటెస్ట్">లేటెస్ట్</li>
                <li class="nav-item" data-category="జాతీయం">జాతీయం</li>
                <li class="nav-item" data-category="అంతర్జాతీయం">అంతర్జాతీయం</li>
                <li class="nav-item" data-category="రాజకీయాలు">రాజకీయాలు</li>
                <li class="nav-item" data-category="ఆరోగ్యం">ఆరోగ్యం</li>
                <li class="nav-item" data-category="ఆటలు">ఆటలు</li>
                <li class="nav-item" data-category="వాతావరణం">వాతావరణం</li>
            </ul>
        </nav>

        <!-- Search Bar (Hidden by default) -->
        <div id="search-container" class="search-container container hidden">
            <input type="text" id="search-input" placeholder="వార్తలను వెతకండి...">
        </div>
        
    </div>

    <!-- Main Content -->
    <main class="container main-content">
        <!-- Weather Widget -->
        <section class="weather-section" id="weather-widget">
            <div class="weather-card">
                <div class="weather-info">
                    <h3 id="w-city">Allagadda</h3>
                    <p id="w-desc">పాక్షికంగా మేఘావృతం</p>
                </div>
                <div class="weather-temp">
                    <span id="w-temp">32°C</span>
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </div>
            </div>
        </section>

        <!-- News Grid -->
        <section class="news-grid" id="news-container">
            <!-- News Cards Injected via JS -->
        </section>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container footer-content">
            <p>Copyright &copy; Commonmanishi.in</p>
            <p>All rights reserved</p>
            <p class="developer-tag">Designed & Developed by <a href="https://github.com/html-ramu" target="_blank">html-ramu</a></p>
        </div>
    </footer>

    <!-- Scroll to Top Button -->
    <button id="scroll-top" class="hidden" aria-label="Scroll to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
